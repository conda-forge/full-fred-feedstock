{% set name = "full-fred" %}
{% set version = "0.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/full_fred-{{ version }}.tar.gz
  sha256: d90187c13455c6bafbb23471378b3f79b295b9cd99666c4a9af6ca35108ce3ed

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 1

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=42
    - wheel
    - pip
  run:
    - python >={{ python_min }}
    - pandas
    - requests

test:
  imports:
    - full_fred
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/7astro7/full_fred
  summary: Full interface to Federal Reserve Economic Data (FRED)
  dev_url: https://github.com/7astro7/full_fred
  license: GPL-3.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - sumanth-manchala
